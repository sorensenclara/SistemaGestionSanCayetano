<a href="{{ href }}" class="citizen-action-card">
    <div class="citizen-action-card-icon {{ icon_class }}">
        <i class="bi {{ icon }}"></i>
    </div>
    <div class="citizen-action-card-body">
        <strong>{{ title }}</strong>
        <span>{{ description }}</span>
    </div>
    <i class="bi bi-chevron-right citizen-action-card-arrow"></i>
</a>
