<a href="{{ href }}" class="platform-action-card platform-action-card--{{ color|default:'green' }}">
    <div class="platform-action-icon platform-action-icon--{{ color|default:'green' }}">
        <i class="bi {{ icon }}"></i>
    </div>
    <div>
        <h3>{{ title }}</h3>
        <p>{{ description }}</p>
    </div>
    <i class="bi bi-chevron-right"></i>
</a>
