{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Artículo - San Cayetano{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-white border-0 pt-4 pb-0">
                <h3 class="fw-bold"><i class="fa-solid fa-box"></i> {% if object %}Editar{% else %}Nuevo{% endif %} Artículo</h3>
            </div>
            <div class="card-body p-4">
                {% crispy form %}
            </div>
            <div class="card-footer bg-white border-0 pb-4">
                <a href="{% url 'article_list' %}" class="btn btn-link text-secondary text-decoration-none"><i class="fa-solid fa-arrow-left"></i> Volver</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
