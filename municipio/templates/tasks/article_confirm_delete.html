{% extends 'base.html' %}

{% block title %}Eliminar Artículo - San Cayetano{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-4 border-danger">
            <div class="card-body p-5 text-center">
                <i class="fa-solid fa-triangle-exclamation text-danger mb-3" style="font-size: 3rem;"></i>
                <h3 class="fw-bold mb-4">¿Estás seguro?</h3>
                <p class="mb-4">Vas a eliminar el artículo: <strong>{{ object.name }}</strong>.<br>Esta acción no se puede deshacer.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'article_list' %}" class="btn btn-outline-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
