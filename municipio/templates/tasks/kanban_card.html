<div class="card mb-2 kanban-card {% if task.is_overdue %}border-danger{% else %}border-0 shadow-sm{% endif %}" data-id="{{ task.id }}" style="cursor: grab;">
    <div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <h6 class="card-title fw-bold mb-0 text-truncate" title="{{ task.title }}">{{ task.title }}</h6>
            <a href="{% url 'task_update' task.id %}" class="text-secondary hover-primary"><i class="fa-solid fa-pen-to-square"></i></a>
        </div>
        <p class="card-text small text-muted text-truncate mb-2" title="{{ task.description }}">{{ task.description|default:"Sin descripción" }}</p>
        
        <div class="d-flex justify-content-between align-items-center mt-2 pt-2 border-top">
            <span class="badge bg-light text-dark border {% if task.is_overdue %}border-danger text-danger{% endif %}" title="Vencimiento">
                <i class="fa-regular fa-calendar"></i> {{ task.due_date|date:"d M, Y" }}
            </span>
            <span class="badge bg-light text-primary border" title="Asignado a">
                <i class="fa-regular fa-user"></i> 
                {% if task.assigned_to %}
                    {{ task.assigned_to.username }}
                {% else %}
                    Nadie
                {% endif %}
            </span>
        </div>
    </div>
</div>
